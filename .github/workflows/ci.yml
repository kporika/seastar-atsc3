# SPDX-License-Identifier: Apache-2.0
#
# Lightweight CI: no Docker. C++/Seastar builds and shell integration tests
# are expected to run on developer machines (see Makefile `make build`,
# `make integ*`, and optional `make image-integ-*` when using images).
#
# This workflow validates protocol YAML (lint + codegen + Python smoke) and
# ships a clean TypeScript build of the webapp.

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-smoke-webapp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python — protocol lint, codegen, codec smoke
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          pip install pyyaml jinja2
          python3 tools/lint_protomap.py protocol
          python3 tools/codegen.py --in protocol --out lib/generated
          python3 tools/smoke/codec_smoke.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Webapp — install and production build
        working-directory: webapp
        run: |
          set -euo pipefail
          npm ci
          npm run build
