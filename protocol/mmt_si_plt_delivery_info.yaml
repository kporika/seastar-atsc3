# MMT-SI — **Package List Table** **DeliveryInfo** record (**location_type** **0** lab slice).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`PackageListTable::DeliveryInfo`**
# when **location_type** **==** **0** (no IPv4/IPv6/URL location octets). **descripor_loop_length**
# **0** on this minimal path. Variable location payloads and descriptor bytes are future YAML.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_delivery_info
  proto_id: 27
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT DeliveryInfo lab; location_type 0)"
  description: "transport_file_id + location_type + descriptor_loop_length (7 B)"

header:
  total_bits: 56
  fields:
    - { name: transport_file_id, bit_offset: 0, bit_width: 32, type: uint }
    - { name: location_type, bit_offset: 32, bit_width: 8, type: uint }
    - { name: descripor_loop_length, bit_offset: 40, bit_width: 16, type: uint }

fixtures:
  - name: minimal_location_type_zero
    description: "same-flow location, zero descriptor loop"
    raw_hex: "00 00 00 00 00 00 00"
    expected:
      transport_file_id: 0
      location_type: 0
      descripor_loop_length: 0
