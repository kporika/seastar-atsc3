# MMT-SI — **Package List Table** package entry (**MMT_package_id_length** **1**, **location_type** **2** / IPv6, non-zero addrs) (**AAL** lab).
#
# Same wire layout as **`mmt_si_plt_package_entry_id8_location_ipv6`**; fixture uses **MMT_package_id** **0x01**,
# **src** **::ffff:10.0.0.1**, **dst** **::ffff:224.0.0.1**, **dst_port** **5000**.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_package_entry_id8_location_ipv6_nz
  proto_id: 53
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT package entry lab; id_length 1, IPv6 non-zero addrs)"
  description: "one-byte package id + IPv6 ::ffff:10.0.0.1:224.0.0.1:5000 (37 B)"

header:
  total_bits: 296
  fields:
    - { name: MMT_package_id_length, bit_offset: 0, bit_width: 8, type: uint }
    - { name: MMT_package_id, bit_offset: 8, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 16, bit_width: 8, type: uint }
    - { name: ipv6_src_addr_0, bit_offset: 24, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_1, bit_offset: 56, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_2, bit_offset: 88, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_3, bit_offset: 120, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_0, bit_offset: 152, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_1, bit_offset: 184, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_2, bit_offset: 216, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_3, bit_offset: 248, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 280, bit_width: 16, type: uint }

fixtures:
  - name: lab_one_byte_id_mapped_ipv6
    description: "package id 0x01, IPv6 ::ffff:10.0.0.1 -> ::ffff:224.0.0.1:5000"
    raw_hex: "01 01 02 00 00 00 00 00 00 00 00 00 00 ff ff 0a 00 00 01 00 00 00 00 00 00 00 00 00 00 ff ff e0 00 00 01 13 88"
    expected:
      MMT_package_id_length: 1
      MMT_package_id: 1
      location_type: 2
      ipv6_src_addr_0: 0
      ipv6_src_addr_1: 0
      ipv6_src_addr_2: 65535
      ipv6_src_addr_3: 167772161
      ipv6_dst_addr_0: 0
      ipv6_dst_addr_1: 0
      ipv6_dst_addr_2: 65535
      ipv6_dst_addr_3: 3758096385
      dst_port: 5000
