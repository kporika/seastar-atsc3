# MMT-SI — **MMT Package Table** **Asset** with **asset_id_length** **1** and one IPv4
# **MMT_general_location_info** (**location_type** **1**).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`MMTPackageTable::Asset`**
# when **asset_id_length** **==** **1**, **location_count** **==** **1**, and the location is an **IPv4**
# flow. **asset_id** **0x01**, zero IPv4 addresses/port, **asset_descriptors_length** **0**.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_id8_location_ipv4
  proto_id: 38
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; id_length 1, location_type 1)"
  description: "one-byte asset id + one IPv4 location + desc len (26 B)"

header:
  total_bits: 208
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_id, bit_offset: 48, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 56, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 88, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 95, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 96, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 104, bit_width: 8, type: uint }
    - { name: ipv4_src_addr, bit_offset: 112, bit_width: 32, type: uint }
    - { name: ipv4_dst_addr, bit_offset: 144, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 176, bit_width: 16, type: uint }
    - { name: asset_descriptors_length, bit_offset: 192, bit_width: 16, type: uint }

fixtures:
  - name: one_byte_id_ipv4_location
    description: "asset_id 0x01, one IPv4 location, zero addresses and port"
    raw_hex: "00 00 00 00 00 01 01 00 00 00 00 00 01 01 00 00 00 00 00 00 00 00 00 00 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 1
      asset_id: 1
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 1
      location_type: 1
      ipv4_src_addr: 0
      ipv4_dst_addr: 0
      dst_port: 0
      asset_descriptors_length: 0
