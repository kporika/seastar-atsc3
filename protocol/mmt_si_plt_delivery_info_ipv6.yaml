# MMT-SI — **Package List Table** **DeliveryInfo** record (**location_type** **2** / IPv6 lab slice).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`PackageListTable::DeliveryInfo`**
# when **location_type** **==** **0x02** (**MMTP** packet of **IPv6** data flow). **descripor_loop_length**
# **0** on this minimal path. **ipv6_*_addr_*** words are **BE32** slices of the **128**-bit address.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_delivery_info_ipv6
  proto_id: 29
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT DeliveryInfo IPv6 lab; location_type 2)"
  description: "transport_file_id + location_type 2 + IPv6 addrs + dst_port + desc len (41 B)"

header:
  total_bits: 328
  fields:
    - { name: transport_file_id, bit_offset: 0, bit_width: 32, type: uint }
    - { name: location_type, bit_offset: 32, bit_width: 8, type: uint }
    - { name: ipv6_src_addr_0, bit_offset: 40, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_1, bit_offset: 72, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_2, bit_offset: 104, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_3, bit_offset: 136, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_0, bit_offset: 168, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_1, bit_offset: 200, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_2, bit_offset: 232, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_3, bit_offset: 264, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 296, bit_width: 16, type: uint }
    - { name: descripor_loop_length, bit_offset: 312, bit_width: 16, type: uint }

fixtures:
  - name: minimal_ipv6_zero_addrs
    description: "IPv6 flow, zero addresses and port, zero descriptor loop"
    raw_hex: "00 00 00 00 02 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"
    expected:
      transport_file_id: 0
      location_type: 2
      ipv6_src_addr_0: 0
      ipv6_src_addr_1: 0
      ipv6_src_addr_2: 0
      ipv6_src_addr_3: 0
      ipv6_dst_addr_0: 0
      ipv6_dst_addr_1: 0
      ipv6_dst_addr_2: 0
      ipv6_dst_addr_3: 0
      dst_port: 0
      descripor_loop_length: 0
