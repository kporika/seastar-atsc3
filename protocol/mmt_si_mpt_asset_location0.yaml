# MMT-SI — **MMT Package Table** **Asset** with one **MMT_general_location_info** (**location_type** **0**).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`MMTPackageTable::Asset`** when
# **asset_id_length** **==** **0**, **location_count** **==** **1**, and the location is same-flow
# (**location_type** **0**, **packet_id** only). **asset_descriptors_length** **0** on this path.
# Other location types and variable **asset_id** octets are future YAML.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_location0
  proto_id: 35
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; id_length 0, location_type 0)"
  description: "zero-id asset + one same-flow location + desc len (17 B)"

header:
  total_bits: 136
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 48, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 80, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 87, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 88, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 96, bit_width: 8, type: uint }
    - { name: packet_id, bit_offset: 104, bit_width: 16, type: uint }
    - { name: asset_descriptors_length, bit_offset: 120, bit_width: 16, type: uint }

fixtures:
  - name: one_same_flow_location
    description: "zero asset_id, one same-flow location, zero descriptor bytes"
    raw_hex: "00 00 00 00 00 00 00 00 00 00 00 01 00 00 00 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 0
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 1
      location_type: 0
      packet_id: 0
      asset_descriptors_length: 0
