# MMT-SI — **MMT Package Table** **Asset** with **asset_id_length** **2** and one IPv4
# **MMT_general_location_info** with non-zero addresses (**AAP** lab).
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_id16_location_ipv4_nz
  proto_id: 57
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; id_length 2, IPv4 non-zero addrs)"
  description: "two-byte asset id + IPv4 10.0.0.1:224.0.0.1:5000 (27 B)"

header:
  total_bits: 216
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_id_byte0, bit_offset: 48, bit_width: 8, type: uint }
    - { name: asset_id_byte1, bit_offset: 56, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 64, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 96, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 103, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 104, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 112, bit_width: 8, type: uint }
    - { name: ipv4_src_addr, bit_offset: 120, bit_width: 32, type: uint }
    - { name: ipv4_dst_addr, bit_offset: 152, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 184, bit_width: 16, type: uint }
    - { name: asset_descriptors_length, bit_offset: 200, bit_width: 16, type: uint }

fixtures:
  - name: lab_two_byte_id_multicast_ipv4
    description: "asset_id 0x01 0x02, IPv4 location 10.0.0.1 -> 224.0.0.1:5000"
    raw_hex: "00 00 00 00 00 02 01 02 00 00 00 00 00 01 01 0a 00 00 01 e0 00 00 01 13 88 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 2
      asset_id_byte0: 1
      asset_id_byte1: 2
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 1
      location_type: 1
      ipv4_src_addr: 167772161
      ipv4_dst_addr: 3758096385
      dst_port: 5000
      asset_descriptors_length: 0
