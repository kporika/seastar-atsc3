# MMT-SI — **MMT Package Table** **Asset** with **asset_id_length** **2** and one IPv6 location (**AAQ** lab).
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_id16_location_ipv6
  proto_id: 58
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; id_length 2, location_type 2)"
  description: "two-byte asset id + one IPv6 location + desc len (51 B)"

header:
  total_bits: 408
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_id_byte0, bit_offset: 48, bit_width: 8, type: uint }
    - { name: asset_id_byte1, bit_offset: 56, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 64, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 96, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 103, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 104, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 112, bit_width: 8, type: uint }
    - { name: ipv6_src_addr_0, bit_offset: 120, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_1, bit_offset: 152, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_2, bit_offset: 184, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_3, bit_offset: 216, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_0, bit_offset: 248, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_1, bit_offset: 280, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_2, bit_offset: 312, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_3, bit_offset: 344, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 376, bit_width: 16, type: uint }
    - { name: asset_descriptors_length, bit_offset: 392, bit_width: 16, type: uint }

fixtures:
  - name: lab_two_byte_id_ipv6_location
    description: "asset_id 0x01 0x02, one IPv6 location, zero addresses and port"
    raw_hex: "00 00 00 00 00 02 01 02 00 00 00 00 00 01 02 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 2
      asset_id_byte0: 1
      asset_id_byte1: 2
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 1
      location_type: 2
      ipv6_src_addr_0: 0
      ipv6_src_addr_1: 0
      ipv6_src_addr_2: 0
      ipv6_src_addr_3: 0
      ipv6_dst_addr_0: 0
      ipv6_dst_addr_1: 0
      ipv6_dst_addr_2: 0
      ipv6_dst_addr_3: 0
      dst_port: 0
      asset_descriptors_length: 0
