# MMT-SI — **Package List Table** **DeliveryInfo** URL record (**url_length** **4** lab slice).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`PackageListTable::DeliveryInfo`**
# when **location_type** **==** **0x05** (**URL**) and **url_length** **==** **4**. Fixed **4** URL
# octets (**"http"**) before **descripor_loop_length** **0**.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_delivery_info_url_4
  proto_id: 45
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT DeliveryInfo URL lab; url_length 4)"
  description: "transport_file_id + loc 5 + url_len 4 + 4 URL octets + desc len (12 B)"

header:
  total_bits: 96
  fields:
    - { name: transport_file_id, bit_offset: 0, bit_width: 32, type: uint }
    - { name: location_type, bit_offset: 32, bit_width: 8, type: uint }
    - { name: url_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: url_byte0, bit_offset: 48, bit_width: 8, type: uint }
    - { name: url_byte1, bit_offset: 56, bit_width: 8, type: uint }
    - { name: url_byte2, bit_offset: 64, bit_width: 8, type: uint }
    - { name: url_byte3, bit_offset: 72, bit_width: 8, type: uint }
    - { name: descripor_loop_length, bit_offset: 80, bit_width: 16, type: uint }

fixtures:
  - name: four_byte_url_http
    description: "URL location, url octets http, zero descriptor loop"
    raw_hex: "00 00 00 00 05 04 68 74 74 70 00 00"
    expected:
      transport_file_id: 0
      location_type: 5
      url_length: 4
      url_byte0: 104
      url_byte1: 116
      url_byte2: 116
      url_byte3: 112
      descripor_loop_length: 0
