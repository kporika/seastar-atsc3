# MMT-SI — **MMT Package Table** **Asset** record (**asset_id_length** **2** lab slice).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`MMTPackageTable::Asset`**
# when **asset_id_length** **==** **2**: two **asset_id** octets before **asset_type**.
# **location_count** **0** and **asset_descriptors_length** **0** on this minimal path.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_id16
  proto_id: 48
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; asset_id_length 2)"
  description: "identifier + scheme + id_len 2 + 2 id octets + type + flags + counts (16 B)"

header:
  total_bits: 128
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_id_byte0, bit_offset: 48, bit_width: 8, type: uint }
    - { name: asset_id_byte1, bit_offset: 56, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 64, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 96, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 103, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 104, bit_width: 8, type: uint }
    - { name: asset_descriptors_length, bit_offset: 112, bit_width: 16, type: uint }

fixtures:
  - name: two_byte_id
    description: "asset_id octets 0x01 0x02, zero locations, zero descriptor bytes"
    raw_hex: "00 00 00 00 00 02 01 02 00 00 00 00 00 00 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 2
      asset_id_byte0: 1
      asset_id_byte1: 2
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 0
      asset_descriptors_length: 0
