# MMTP — **DU header for a timed-media data unit** (ISO/IEC 23008-1 MMTP
# ISOBMFF-mode payload, Figure 4). Present only when **fragment_type** (**FT**)
# in `mmtp_payload_isobmff_prefix` is **2** (data unit) **and** **timed_flag**
# (**T**) is **true**. On the wire it follows **`mmtp_payload_isobmff_prefix`**
# and, when **aggregation_flag** is **1**, a leading **DU_length** (16b) for
# this data unit (not modeled here).
#
# Bit order: MSB-first within each octet (bit_offset 0 = MSB of byte 0).

protocol:
  name: mmtp_payload_isobmff_du_header_timed
  proto_id: 12
  spec: "ISO/IEC 23008-1 (MMTP ISOBMFF-mode DU header, timed)"
  description: "MMTP ISOBMFF — timed DU header (mf seq, sample, offset, priority, dep_counter)"

header:
  total_bits: 112
  fields:
    - { name: movie_fragment_sequence_number, bit_offset: 0, bit_width: 32, type: uint }
    - { name: sample_number, bit_offset: 32, bit_width: 32, type: uint }
    - { name: offset, bit_offset: 64, bit_width: 32, type: uint }
    - { name: subsample_priority, bit_offset: 96, bit_width: 8, type: uint }
    - { name: dependency_counter, bit_offset: 104, bit_width: 8, type: uint }

fixtures:
  - name: minimal_counts
    description: "mfseq=1, sample=2, offset=3, priority=0x5A, dep_counter=0x3C"
    raw_hex: "00 00 00 01  00 00 00 02  00 00 00 03  5A 3C"
    expected:
      movie_fragment_sequence_number: 1
      sample_number: 2
      offset: 3
      subsample_priority: 90
      dependency_counter: 60
