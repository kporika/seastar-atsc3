# MMT-SI — **Package List Table** package entry (**MMT_package_id_length** **0**, **location_type** **2** / IPv6).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`PackageListTable::Unpack`**
# after **num_of_packages**: **MMT_package_id_length**, optional **MMT_package_id** octets, then
# **MMT_general_location_info** when **location_type** **==** **0x02** (**IPv6** flow).
# **ipv6_*_addr_*** words are **BE32** slices of the **128**-bit address.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_package_entry_ipv6
  proto_id: 41
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT package entry lab; id_length 0, location_type 2)"
  description: "package_id_length 0 + IPv6 general_location_info (36 B)"

header:
  total_bits: 288
  fields:
    - { name: MMT_package_id_length, bit_offset: 0, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 8, bit_width: 8, type: uint }
    - { name: ipv6_src_addr_0, bit_offset: 16, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_1, bit_offset: 48, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_2, bit_offset: 80, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_3, bit_offset: 112, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_0, bit_offset: 144, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_1, bit_offset: 176, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_2, bit_offset: 208, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_3, bit_offset: 240, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 272, bit_width: 16, type: uint }

fixtures:
  - name: minimal_zero_id_ipv6
    description: "zero package id, IPv6 location, zero addresses and port"
    raw_hex: "00 02 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"
    expected:
      MMT_package_id_length: 0
      location_type: 2
      ipv6_src_addr_0: 0
      ipv6_src_addr_1: 0
      ipv6_src_addr_2: 0
      ipv6_src_addr_3: 0
      ipv6_dst_addr_0: 0
      ipv6_dst_addr_1: 0
      ipv6_dst_addr_2: 0
      ipv6_dst_addr_3: 0
      dst_port: 0
