# MMT-SI — **Package List Table** package entry (**MMT_package_id_length** **1**, **location_type** **1** / IPv4, non-zero addrs) (**AAK** lab).
#
# Same wire layout as **`mmt_si_plt_package_entry_id8_location_ipv4`**; fixture uses **MMT_package_id** **0x01**,
# **src** **10.0.0.1**, **dst** **224.0.0.1**, **dst_port** **5000**.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_package_entry_id8_location_ipv4_nz
  proto_id: 52
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT package entry lab; id_length 1, IPv4 non-zero addrs)"
  description: "one-byte package id + IPv4 10.0.0.1:224.0.0.1:5000 (13 B)"

header:
  total_bits: 104
  fields:
    - { name: MMT_package_id_length, bit_offset: 0, bit_width: 8, type: uint }
    - { name: MMT_package_id, bit_offset: 8, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 16, bit_width: 8, type: uint }
    - { name: ipv4_src_addr, bit_offset: 24, bit_width: 32, type: uint }
    - { name: ipv4_dst_addr, bit_offset: 56, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 88, bit_width: 16, type: uint }

fixtures:
  - name: lab_one_byte_id_multicast_ipv4
    description: "package id 0x01, IPv4 location 10.0.0.1 -> 224.0.0.1:5000"
    raw_hex: "01 01 01 0a 00 00 01 e0 00 00 01 13 88"
    expected:
      MMT_package_id_length: 1
      MMT_package_id: 1
      location_type: 1
      ipv4_src_addr: 167772161
      ipv4_dst_addr: 3758096385
      dst_port: 5000
