# MMT-SI — **Package List Table** package entry (**MMT_package_id_length** **1**, **location_type** **2** / IPv6).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`PackageListTable::Unpack`**
# after **num_of_packages**: **MMT_package_id_length**, **MMT_package_id** octets, then
# **MMT_general_location_info** when **location_type** **==** **0x02** (**IPv6** flow).
# **ipv6_*_addr_*** words are **BE32** slices of the **128**-bit address.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_plt_package_entry_id8_location_ipv6
  proto_id: 43
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 PLT package entry lab; id_length 1, location_type 2)"
  description: "one-byte package id + IPv6 general_location_info (37 B)"

header:
  total_bits: 296
  fields:
    - { name: MMT_package_id_length, bit_offset: 0, bit_width: 8, type: uint }
    - { name: MMT_package_id, bit_offset: 8, bit_width: 8, type: uint }
    - { name: location_type, bit_offset: 16, bit_width: 8, type: uint }
    - { name: ipv6_src_addr_0, bit_offset: 24, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_1, bit_offset: 56, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_2, bit_offset: 88, bit_width: 32, type: uint }
    - { name: ipv6_src_addr_3, bit_offset: 120, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_0, bit_offset: 152, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_1, bit_offset: 184, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_2, bit_offset: 216, bit_width: 32, type: uint }
    - { name: ipv6_dst_addr_3, bit_offset: 248, bit_width: 32, type: uint }
    - { name: dst_port, bit_offset: 280, bit_width: 16, type: uint }

fixtures:
  - name: one_byte_id_ipv6_location
    description: "package id 0x01, IPv6 location, zero addresses and port"
    raw_hex: "01 01 02 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00"
    expected:
      MMT_package_id_length: 1
      MMT_package_id: 1
      location_type: 2
      ipv6_src_addr_0: 0
      ipv6_src_addr_1: 0
      ipv6_src_addr_2: 0
      ipv6_src_addr_3: 0
      ipv6_dst_addr_0: 0
      ipv6_dst_addr_1: 0
      ipv6_dst_addr_2: 0
      ipv6_dst_addr_3: 0
      dst_port: 0
