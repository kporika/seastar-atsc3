# MMT-SI — **MMT Package Table** **Asset** record (**asset_id_length** **1** lab slice).
#
# **Normative context:** **ISO/IEC 23008-1** **§10.3** / DumpTS **`MMTPackageTable::Asset`**
# when **asset_id_length** **==** **1**: one **asset_id** octet before **asset_type**.
# **location_count** **0** and **asset_descriptors_length** **0** on this minimal path.
# Other id lengths and **MMT_general_location_info** records are future YAML.
#
# Bit order: MSB-first within each octet.

protocol:
  name: mmt_si_mpt_asset_id8
  proto_id: 34
  spec: "ISO/IEC 23008-1 (MMT-SI §10.3 MPT Asset lab; asset_id_length 1)"
  description: "identifier + scheme + id_len 1 + id octet + type + flags + counts (15 B)"

header:
  total_bits: 120
  fields:
    - { name: identifier_type, bit_offset: 0, bit_width: 8, type: uint }
    - { name: asset_id_scheme, bit_offset: 8, bit_width: 32, type: uint }
    - { name: asset_id_length, bit_offset: 40, bit_width: 8, type: uint }
    - { name: asset_id, bit_offset: 48, bit_width: 8, type: uint }
    - { name: asset_type, bit_offset: 56, bit_width: 32, type: uint }
    - { name: reserved, bit_offset: 88, bit_width: 7, type: uint }
    - { name: asset_clock_relation_flag, bit_offset: 95, bit_width: 1, type: bool }
    - { name: location_count, bit_offset: 96, bit_width: 8, type: uint }
    - { name: asset_descriptors_length, bit_offset: 104, bit_width: 16, type: uint }

fixtures:
  - name: one_byte_id
    description: "one asset_id octet 0x01, zero locations, zero descriptor bytes"
    raw_hex: "00 00 00 00 00 01 01 00 00 00 00 00 00 00 00"
    expected:
      identifier_type: 0
      asset_id_scheme: 0
      asset_id_length: 1
      asset_id: 1
      asset_type: 0
      reserved: 0
      asset_clock_relation_flag: false
      location_count: 0
      asset_descriptors_length: 0
